openapi: 3.0.0
info:
  title: GYRA+ API - MCP Server
  description: API da Gyra+ para analise de credito. Spec curada para uso com agentes AI via MCP.
  version: 1.0
  contact: {}
servers: []
paths:
  /auth/authenticate:
    post:
      operationId: AuthController_generateAccessToken
      parameters:
        - name: gyra-client-secret
          in: header
          description: 'Client Secret da integracao. Obtido no painel Toolbox em Configuracoes > Integracao.'
          schema:
            type: string
        - name: gyra-client-id
          in: header
          description: 'Client ID da integracao. Obtido no painel Toolbox em Configuracoes > Integracao.'
          schema:
            type: string
      responses:
        200:
          description: Objeto com accessToken (JWT) e expiresIn (tempo em segundos).
      tags:
        - auth
      summary: Gerar token de acesso JWT
      description: |
          Autentica via client credentials (client-id e client-secret) e retorna um JWT.
          
          Este e o primeiro passo para usar a API. O token retornado deve ser enviado
          no header Authorization de todas as requisicoes subsequentes.
          
          NOTA: No MCP server, a autenticacao e automatica — este tool e exposto apenas
          para uso manual ou debug. O server gerencia o token internamente.
  /webhook:
    post:
      operationId: WebhookController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookDto'
      responses:
        200:
          description: 'Webhook criado com id, type, url e organizationId.'
      tags:
        - webhook
      summary: Criar webhook para notificacoes
      description: |
          Registra uma URL de webhook para receber notificacoes em tempo real.
          
          Tipos de webhook disponiveis:
          - REPORT: notificado quando um relatorio muda de status (PENDING → APPROVED/DENIED/ALERT)
          - REPORT_FINISHED: notificado quando o processamento do relatorio finaliza
          - REPORT_STATUS: notificado em cada mudanca de status intermediaria
          - CREDIT_POLICY: notificado quando a politica de credito e avaliada
          - OPTIN: notificado quando um opt-in e processado
          
          O webhook recebe um POST na URL configurada com o payload do evento.
          Se apiKey for informada, sera enviada no header api-key da requisicao.
          
          RECOMENDADO: Sempre configure um webhook ao criar relatorios. Evita
          a necessidade de polling com get_report.
  /webhook/findBy:
    get:
      operationId: WebhookController_find
      parameters:
        - name: webhookId
          required: false
          in: query
          description: 'ID do webhook especifico (opcional). Sem este parametro, retorna todos.'
          example: 664b63037707171ba58cf311
          schema:
            type: string
      responses:
        200:
          description: 'Webhook(s) com id, type, url, apiKey e organizationId.'
      tags:
        - webhook
      summary: Consultar webhooks cadastrados
      description: |
          Busca webhooks cadastrados na organizacao.
          
          Se webhookId for informado, retorna o webhook especifico.
          Caso contrario, retorna todos os webhooks da organizacao autenticada.
  /webhook/{id}:
    delete:
      operationId: WebhookController_delete
      parameters:
        - name: id
          required: true
          in: path
          description: ID do webhook a remover.
          example: 664b63037707171ba58cf311
          schema:
            type: string
      responses:
        200:
          description: Confirmacao de remocao.
      tags:
        - webhook
      summary: Deletar webhook
      description: Remove um webhook cadastrado. A URL deixa de receber notificacoes imediatamente.
  /report/section/{id}:
    get:
      operationId: SectionController_get
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: 'ID da secao (ObjectId). Disponivel no array sections[] do relatorio.'
      responses:
        200:
          description: 'Secao completa com dados detalhados, status de finalizacao e metadados.'
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar secao por ID
      description: |
          Retorna os dados detalhados de uma secao especifica de um relatorio.
          
          Cada relatorio e composto por varias secoes que contem dados de diferentes fontes:
          - Informacoes basicas (CNPJ/CPF, endereco, socios, QSA)
          - Processos judiciais
          - Protestos em cartorio
          - Dividas Pefin/Refin
          - Dados SCR / Open Finance (Banco Central)
          - PEP e sancoes internacionais
          - Resultado da politica de credito
          
          Use get_report para obter a lista de secoes e seus IDs.
  /report:
    post:
      operationId: ReportController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportDto'
      responses:
        200:
          description: 'Objeto do relatorio com id, status (PENDING), document, type e createdAt.'
      tags:
        - report
      security:
        - authorization: []
      summary: Criar relatorio de analise de credito
      description: |
          Cria um novo relatorio de analise de credito para um CPF ou CNPJ.
          
          O processamento e ASSINCRONO: voce recebe o reportId imediatamente com status PENDING.
          Para saber quando o relatorio ficou pronto:
            1. Configure um webhook (create_webhook) para receber notificacao automatica
            2. Ou consulte periodicamente com get_report ate o status mudar
          
          Status possiveis: PENDING → APPROVED, DENIED ou ALERT.
          O tipo de relatorio (SIMPLES, ESSENCIAL, COMPLETO, COMPLETO+) e determinado
          pela politica de credito (policyId) utilizada.
          
          Use list_policies para obter os policyIds disponiveis na organizacao.
  /report/list:
    get:
      operationId: ReportController_list
      parameters:
        - name: take
          in: query
          required: false
          schema:
            type: integer
          description: Quantidade maxima de registros.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: Offset de paginacao.
        - name: statusValue
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - APPROVED
              - DENIED
              - ALERT
          description: Status do relatorio.
        - name: document
          in: query
          required: false
          schema:
            type: string
          description: CPF ou CNPJ (apenas numeros).
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: ID do usuario criador.
        - name: createdAtBetween
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: 'Intervalo [startISO, endISO].'
        - name: productIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filtrar por productIds.
        - name: operationResultId
          in: query
          required: false
          schema:
            type: string
          description: ID do resultado de operacao.
        - name: reportIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: IDs especificos de relatorios.
        - name: batchId
          in: query
          required: false
          schema:
            type: string
          description: ID do batch.
      responses:
        200:
          description: Array de relatorios com metadados (sem secoes detalhadas).
      tags:
        - report
      security:
        - authorization: []
      summary: Listar relatorios da organizacao
      description: |
          Lista relatorios com filtros opcionais. Retorna relatorios da organizacao
          autenticada. Analistas de credito veem apenas os proprios relatorios.
          
          Suporta paginacao (take/skip) e filtros por status, documento, usuario, periodo,
          produtos, operacao, batch.
  /report/count:
    get:
      operationId: ReportController_count
      parameters:
        - name: statusValue
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - APPROVED
              - DENIED
              - ALERT
          description: Status do relatorio.
        - name: document
          in: query
          required: false
          schema:
            type: string
          description: CPF ou CNPJ (apenas numeros).
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: ID do usuario criador.
        - name: createdAtBetween
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: 'Intervalo [startISO, endISO].'
        - name: productIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filtrar por productIds.
        - name: operationResultId
          in: query
          required: false
          schema:
            type: string
          description: ID do resultado de operacao.
        - name: batchId
          in: query
          required: false
          schema:
            type: string
          description: ID do batch.
      responses:
        200:
          description: Objeto com count (numero de relatorios).
      tags:
        - report
      security:
        - authorization: []
      summary: Contar relatorios
      description: |
          Retorna a contagem de relatorios que correspondem aos filtros aplicados.
          Util para dashboards e analytics sem carregar os dados completos. Aceita os mesmos
          filtros de list_reports.
  /report/export/{id}:
    get:
      operationId: ReportController_export
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio a exportar.
      responses:
        200:
          description: 'Objeto { status: "processing", reportId } — o PDF chega via webhook.'
      tags:
        - report
      security:
        - authorization: []
      summary: Exportar relatorio em PDF (assincrono)
      description: |
          Solicita a geracao de PDF de um relatorio. Processamento assincrono:
          retorna imediatamente com status "processing" e o arquivo e entregue via webhook
          quando pronto.
          
          Use quando precisar processar varios relatorios em lote ou quando a latencia nao
          for critica. Para receber o PDF na hora, use export_report_sync.
  /report/export-sync/{id}:
    get:
      operationId: ReportController_exportSync
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio a exportar.
      responses:
        200:
          description: 'Objeto com a URL de download do PDF gerado (assinada, com expiracao).'
      tags:
        - report
      security:
        - authorization: []
      summary: Exportar relatorio em PDF
      description: |
          Exporta um relatorio em PDF e retorna a URL de download na resposta.
          
          O endpoint BLOQUEIA ate a geracao concluir — pode levar ate 6 minutos para
          relatorios completos. Use com timeout adequado do lado do cliente. Sempre
          gera PDF do relatorio completo (todas as secoes).
          
          Pre-requisito: o relatorio precisa estar finalizado (status APPROVED, DENIED
          ou ALERT). Relatorios em PENDING nao podem ser exportados.
  /report/{id}:
    get:
      operationId: ReportController_get
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio (ObjectId). Retornado pelo create_report.
        - name: details
          required: false
          in: query
          description: Defina como "false" para omitir detalhes das secoes. Util para verificar status rapidamente.
          schema:
            type: string
      responses:
        200:
          description: 'Relatorio completo com secoes, decisao e metadados.'
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar relatorio por ID
      description: |
          Retorna o relatorio completo com secoes, decisao da politica e score.
          
          Se o relatorio esta em processamento, o status sera PENDING.
          Quando pronto, o objeto retornado contem:
          - status: APPROVED, DENIED ou ALERT
          - policyResult: decisao automatica com regras avaliadas
          - sections[]: array de secoes (BASIC_INFORMATION, PROCESSES, PROTESTS, SCR, etc.)
          - commentary: analise do analista (se houver)
          
          Use details=false para obter apenas metadados sem o conteudo das secoes.
  /report/{id}/section/{sectionType}:
    get:
      operationId: ReportController_getReportSection
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio.
        - name: sectionType
          required: true
          in: path
          schema:
            type: string
          description: 'Tipo da secao (ex: BASIC_INFORMATION, PROCESSES, SCR, CREDIT_POLICY).'
      responses:
        200:
          description: Secao com dados detalhados do tipo solicitado.
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar secao especifica do relatorio
      description: |
          Retorna uma secao especifica de um relatorio pelo tipo.
          
          Tipos de secao disponiveis:
          - BASIC_INFORMATION: dados cadastrais, endereco, socios
          - PROCESSES: processos judiciais
          - PROTESTS: protestos em cartorio
          - PEFIN_REFIN: dividas Pefin/Refin
          - SCR: dados do Sistema de Informacoes de Credito do Banco Central
          - PEP_SANCTIONS: Pessoa Politicamente Exposta e sancoes
          - CREDIT_POLICY: resultado da avaliacao da politica de credito
  /report/analyze:
    post:
      operationId: ReportController_analyze
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID do relatorio a analisar.
                approved:
                  type: boolean
                  description: 'true para aprovar, false para negar.'
                commentary:
                  type: string
                  description: Comentario do analista (opcional).
              required:
                - id
                - approved
      responses:
        200:
          description: Relatorio atualizado com a analise registrada.
      tags:
        - report
      security:
        - authorization: []
      summary: Analisar/aprovar relatorio
      description: |
          Registra a analise de um relatorio por um analista de credito.
          
          Define o status de aprovacao (approved: true/false), comentarios do analista
          e decisao manual. Usado quando a decisao automatica da politica precisa de
          revisao humana.
  /report/re-analyze:
    post:
      operationId: ReportController_reAnalyze
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID do relatorio a re-analisar.
                approved:
                  type: boolean
                  description: 'true para aprovar, false para negar.'
                commentary:
                  type: string
                  description: Comentario do analista (opcional).
              required:
                - id
                - approved
      responses:
        200:
          description: Relatorio atualizado com a nova analise.
      tags:
        - report
      security:
        - authorization: []
      summary: Re-analisar relatorio
      description: |
          Re-analisa um relatorio previamente analisado. Verifica se o usuario
          tem permissao para editar relatorios com base na politica de credito configurada.
          
          Util quando dados adicionais foram obtidos ou a decisao precisa ser revisada.
  /credit-policy/policy:
    get:
      operationId: PolicyController_find
      parameters:
        - name: percentages
          required: false
          in: query
          description: Enable percentage of policies
          schema:
            type: boolean
        - name: enabled
          required: false
          in: query
          description: Filtrar por politicas ativas. "true" ou "false" (como string).
          schema:
            type: boolean
        - name: protected
          required: false
          in: query
          description: Incluir politicas protegidas do sistema. "true" ou "false" (como string).
          schema:
            type: boolean
      responses:
        200:
          description: 'Array de politicas com id, name, enabled, documentType, grupos de regras e configuracoes.'
      tags:
        - credit-policy/policy
      security:
        - authorization: []
      summary: Listar politicas de credito
      description: |
          Lista as politicas de credito da organizacao.
          
          Cada politica define:
          - Quais fontes de dados consultar (bureau de credito, SCR/Open Finance, etc.)
          - Regras de aprovacao automatica (score, limites, restricoes)
          - Tipo de relatorio gerado (SIMPLES, ESSENCIAL, COMPLETO, COMPLETO+)
          - Grupos de regras com pesos e thresholds
          
          O policyId retornado e necessario para criar relatorios (create_report).
          
          Filtros opcionais:
          - enabled: true para ver apenas politicas ativas
          - protected: true para incluir politicas protegidas (padrao do sistema)
  /insight:
    post:
      operationId: InsightController_generateInsight
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sectionId:
                  type: string
                  description: ID da secao do relatorio para gerar o insight.
              required:
                - sectionId
      responses:
        200:
          description: 'Insight gerado com analise, pontos de atencao e recomendacoes.'
      tags:
        - insight
      summary: Gerar insight com IA para secao do relatorio
      description: |
          Gera uma analise automatica com IA para uma secao especifica de um relatorio.
          
          A IA analisa os dados da secao e produz um resumo interpretativo com
          pontos de atencao e recomendacoes. O insight e salvo como comentario
          na secao do relatorio.
          
          Requisitos:
          - A secao deve estar finalizada (processamento completo)
          - A organizacao deve ter plano que suporte IA (nao disponivel em planos Trial ou Basic)
          
          Use get_report para obter os IDs das secoes disponiveis.
  /v2/report:
    post:
      operationId: ReportApiController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportDto'
      responses:
        200:
          description: ''
      tags:
        - report
      security:
        - authorization: []
      summary: Criar relatorio (API v2)
      description: |
          Versao v2 da criacao de relatorio. Mesma funcionalidade de create_report
          com payload revisado. Use create_report_v2 para novas integracoes.
  /v2/report/{id}:
    get:
      operationId: ReportApiController_get
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio.
      responses:
        200:
          description: ''
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar relatorio (API v2)
      description: |
          Versao v2 da consulta de relatorio. Retorna o relatorio com estrutura
          atualizada. Use get_report_v2 para novas integracoes.
components:
  securitySchemes:
    authorization:
      scheme: Bearer
      bearerFormat: JWT
      type: apiKey
      name: authorization
      description: Enter JWT token
      in: header
  schemas:
    CreateWebhookDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/WebhookTypeEnum'
        url:
          type: string
          description: The URL for the webhook
          example: 'https://webhook-test.com/a0a7aadb8de3e'
        apiKey:
          type: string
          description: API Key para uma requisição autenticada (será enviado como `api-key` em headers)
          example: xxx-xxx-xxx
      required:
        - type
        - url
        - apiKey
    WebhookTypeEnum:
      type: string
      description: Type Webhook
      enum:
        - REPORT
        - OPTIN
        - CREDIT_POLICY
        - REPORT_STATUS
        - REPORT_FINISHED
        - REPORT_EXPORTED
        - OPERATION
    CreateReportDto:
      type: object
      properties:
        policyId:
          type: string
        document:
          type: string
        type:
          type: string
      required:
        - policyId
        - document
        - type