openapi: 3.0.0
info:
  title: GYRA+ API - MCP Server
  description: API da Gyra+ para analise de credito. Spec curada para uso com agentes AI via MCP.
  version: 1.0
  contact: {}
servers: []
paths:
  /auth/authenticate:
    post:
      operationId: AuthController_generateAccessToken
      parameters:
        - name: gyra-client-secret
          in: header
          description: 'Client Secret da integracao. Obtido no painel Toolbox em Configuracoes > Integracao.'
          schema:
            type: string
        - name: gyra-client-id
          in: header
          description: 'Client ID da integracao. Obtido no painel Toolbox em Configuracoes > Integracao.'
          schema:
            type: string
      responses:
        200:
          description: Objeto com accessToken (JWT) e expiresIn (tempo em segundos).
      tags:
        - auth
      summary: Gerar token de acesso JWT
      description: |
          Autentica via client credentials (client-id e client-secret) e retorna um JWT.
          
          Este e o primeiro passo para usar a API. O token retornado deve ser enviado
          no header Authorization de todas as requisicoes subsequentes.
          
          NOTA: No MCP server, a autenticacao e automatica — este tool e exposto apenas
          para uso manual ou debug. O server gerencia o token internamente.
  /webhook:
    post:
      operationId: WebhookController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookDto'
      responses:
        200:
          description: 'Webhook criado com id, type, url e organizationId.'
      tags:
        - webhook
      summary: Criar webhook para notificacoes
      description: |
          Registra uma URL de webhook para receber notificacoes em tempo real.
          
          Tipos de webhook disponiveis (um tipo por webhook, registre varios se precisar):
          - REPORT: disparado a cada secao do relatorio concluida durante o processamento (granular)
          - REPORT_FINISHED: disparado quando o processamento do relatorio finaliza completamente
          - REPORT_STATUS: disparado quando um analista aprova ou rejeita o relatorio manualmente
          - REPORT_EXPORTED: disparado quando a exportacao (PDF/XLS) de um relatorio e gerada (ou falha)
          - CREDIT_POLICY: disparado quando a politica de credito e avaliada e o status muda
          - OPERATION: disparado quando uma operacao (fluxo multi-relatorio) conclui
          
          O webhook recebe um POST na URL configurada com o payload do evento.
          Se apiKey for informada, sera enviada no header api-key da requisicao.
          
          RECOMENDADO: Sempre configure um webhook ao criar relatorios. Evita
          a necessidade de polling com get_report.
  /webhook/findBy:
    get:
      operationId: WebhookController_find
      parameters:
        - name: webhookId
          required: false
          in: query
          description: 'ID do webhook especifico (opcional). Sem este parametro, retorna todos.'
          example: 664b63037707171ba58cf311
          schema:
            type: string
      responses:
        200:
          description: 'Webhook(s) com id, type, url, apiKey e organizationId.'
      tags:
        - webhook
      summary: Consultar webhooks cadastrados
      description: |
          Busca webhooks cadastrados na organizacao.
          
          Se webhookId for informado, retorna o webhook especifico.
          Caso contrario, retorna todos os webhooks da organizacao autenticada.
  /webhook/{id}:
    delete:
      operationId: WebhookController_delete
      parameters:
        - name: id
          required: true
          in: path
          description: ID do webhook a remover.
          example: 664b63037707171ba58cf311
          schema:
            type: string
      responses:
        200:
          description: Confirmacao de remocao.
      tags:
        - webhook
      summary: Deletar webhook
      description: Remove um webhook cadastrado. A URL deixa de receber notificacoes imediatamente.
  /report/section/{id}:
    get:
      operationId: SectionController_get
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: 'ID da secao (ObjectId). Disponivel no array sections[] do relatorio.'
      responses:
        200:
          description: 'Secao completa com dados detalhados, status de finalizacao e metadados.'
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar secao por ID
      description: |
          Retorna os dados detalhados de uma secao especifica de um relatorio.
          
          Cada relatorio e composto por varias secoes que contem dados de diferentes fontes:
          - Informacoes basicas (CNPJ/CPF, endereco, socios, QSA)
          - Processos judiciais
          - Protestos em cartorio
          - Dividas Pefin/Refin
          - Dados SCR / Open Finance (Banco Central)
          - PEP e sancoes internacionais
          - Resultado da politica de credito
          
          Use get_report para obter a lista de secoes e seus IDs.
  /report/list:
    get:
      operationId: ReportController_list
      parameters:
        - name: take
          in: query
          required: false
          schema:
            type: integer
          description: Quantidade maxima de registros.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: Offset de paginacao.
        - name: statusValue
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - APPROVED
              - DENIED
              - ALERT
          description: Status do relatorio.
        - name: document
          in: query
          required: false
          schema:
            type: string
          description: CPF ou CNPJ (apenas numeros).
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: ID do usuario criador.
        - name: createdAtBetween
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: 'Intervalo [startISO, endISO].'
        - name: productIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filtrar por productIds.
        - name: operationResultId
          in: query
          required: false
          schema:
            type: string
          description: ID do resultado de operacao.
        - name: reportIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: IDs especificos de relatorios.
        - name: batchId
          in: query
          required: false
          schema:
            type: string
          description: ID do batch.
      responses:
        200:
          description: Array de relatorios com metadados (sem secoes detalhadas).
      tags:
        - report
      security:
        - authorization: []
      summary: Listar relatorios da organizacao
      description: |
          Lista relatorios com filtros opcionais. Retorna relatorios da organizacao
          autenticada. Analistas de credito veem apenas os proprios relatorios.
          
          Suporta paginacao (take/skip) e filtros por status, documento, usuario, periodo,
          produtos, operacao, batch.
  /report/export/{id}:
    get:
      operationId: ReportController_export
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio a exportar.
      responses:
        200:
          description: 'Objeto { status: "processing", reportId } — o PDF chega via webhook.'
      tags:
        - report
      security:
        - authorization: []
      summary: Exportar relatorio em PDF (assincrono)
      description: |
          Solicita a geracao de PDF de um relatorio. Processamento assincrono:
          retorna imediatamente com status "processing" e o arquivo e entregue via webhook
          quando pronto.
          
          Use quando precisar processar varios relatorios em lote ou quando a latencia nao
          for critica. Para receber o PDF na hora, use export_report_sync.
  /report/export-sync/{id}:
    get:
      operationId: ReportController_exportSync
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio a exportar.
      responses:
        200:
          description: 'Objeto com a URL de download do PDF gerado (assinada, com expiracao).'
      tags:
        - report
      security:
        - authorization: []
      summary: Exportar relatorio em PDF
      description: |
          Exporta um relatorio em PDF e retorna a URL de download na resposta.
          
          O endpoint BLOQUEIA ate a geracao concluir — pode levar ate 6 minutos para
          relatorios completos. Use com timeout adequado do lado do cliente. Sempre
          gera PDF do relatorio completo (todas as secoes).
          
          Pre-requisito: o relatorio precisa estar finalizado (status APPROVED, DENIED
          ou ALERT). Relatorios em PENDING nao podem ser exportados.
  /report/{id}/section/{sectionType}:
    get:
      operationId: ReportController_getReportSection
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio.
        - name: sectionType
          required: true
          in: path
          schema:
            type: string
          description: 'Tipo da secao (ex: BASIC_INFORMATION, PROCESSES, SCR, CREDIT_POLICY).'
      responses:
        200:
          description: Secao com dados detalhados do tipo solicitado.
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar secao especifica do relatorio
      description: |
          Retorna uma secao especifica de um relatorio pelo tipo.
          
          Tipos de secao disponiveis:
          - BASIC_INFORMATION: dados cadastrais, endereco, socios
          - PROCESSES: processos judiciais
          - PROTESTS: protestos em cartorio
          - PEFIN_REFIN: dividas Pefin/Refin
          - SCR: dados do Sistema de Informacoes de Credito do Banco Central
          - PEP_SANCTIONS: Pessoa Politicamente Exposta e sancoes
          - CREDIT_POLICY: resultado da avaliacao da politica de credito
  /report/analyze:
    post:
      operationId: ReportController_analyze
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID do relatorio a analisar.
                approved:
                  type: boolean
                  description: 'true para aprovar, false para negar.'
                commentary:
                  type: string
                  description: Comentario do analista (opcional).
              required:
                - id
                - approved
      responses:
        200:
          description: Relatorio atualizado com a analise registrada.
      tags:
        - report
      security:
        - authorization: []
      summary: Analisar relatorio manualmente
      description: |
          Registra uma ANALISE MANUAL de um relatorio por um usuario (ex.: analista de credito).

          O usuario submete uma decisao (approved: true/false) com justificativa
          (commentary). Nao reprocessa nem recoleta dados das fontes — apenas registra
          a decisao humana sobre o relatorio existente. Para refazer uma analise manual
          ja registrada, use re_analyze.
  /report/re-analyze:
    post:
      operationId: ReportController_reAnalyze
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID do relatorio a re-analisar.
                approved:
                  type: boolean
                  description: 'true para aprovar, false para negar.'
                commentary:
                  type: string
                  description: Comentario do analista (opcional).
              required:
                - id
                - approved
      responses:
        200:
          description: Relatorio atualizado com a nova analise.
      tags:
        - report
      security:
        - authorization: []
      summary: Refazer analise manual do relatorio
      description: |
          Refaz a ANALISE MANUAL de um relatorio que ja recebeu uma decisao humana
          previa via /report/analyze. Exige permissao do usuario para revisar analises
          manuais ja registradas.

          Nao reprocessa nem recoleta dados das fontes — apenas substitui a decisao
          humana (approved + commentary) anteriormente registrada.
  /credit-policy/policy:
    get:
      operationId: PolicyController_find
      parameters:
        - name: percentages
          required: false
          in: query
          description: Enable percentage of policies
          schema:
            type: boolean
        - name: enabled
          required: false
          in: query
          description: Filtrar por politicas ativas. "true" ou "false" (como string).
          schema:
            type: boolean
        - name: protected
          required: false
          in: query
          description: Incluir politicas protegidas do sistema. "true" ou "false" (como string).
          schema:
            type: boolean
      responses:
        200:
          description: 'Array de politicas com id, name, enabled, documentType, grupos de regras e configuracoes.'
      tags:
        - credit-policy/policy
      security:
        - authorization: []
      summary: Listar politicas de credito
      description: |
          Lista as politicas de credito da organizacao.
          
          Cada politica define:
          - Quais fontes de dados consultar (bureau de credito, SCR/Open Finance, etc.)
          - Regras de aprovacao automatica (score, limites, restricoes)
          - Tipo de relatorio gerado (SIMPLES, ESSENCIAL, COMPLETO, COMPLETO+)
          - Grupos de regras com pesos e thresholds
          
          O policyId retornado e necessario para criar relatorios (create_report).
          
          Filtros opcionais:
          - enabled: true para ver apenas politicas ativas
          - protected: true para incluir politicas protegidas (padrao do sistema)
  /v2/report:
    post:
      operationId: ReportApiController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportDto'
      responses:
        200:
          description: ''
      tags:
        - report
      security:
        - authorization: []
      summary: Criar relatorio (API v2)
      description: |
          Versao v2 da criacao de relatorio. Mesma funcionalidade de create_report
          com payload revisado. Use create_report_v2 para novas integracoes.
  /v2/report/{id}:
    get:
      operationId: ReportApiController_get
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
          description: ID do relatorio.
      responses:
        200:
          description: ''
      tags:
        - report
      security:
        - authorization: []
      summary: Consultar relatorio (API v2)
      description: |
          Versao v2 da consulta de relatorio. Retorna o relatorio com estrutura
          atualizada. Use get_report_v2 para novas integracoes.
components:
  securitySchemes:
    authorization:
      scheme: Bearer
      bearerFormat: JWT
      type: apiKey
      name: authorization
      description: Enter JWT token
      in: header
  schemas:
    CreateWebhookDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/WebhookTypeEnum'
        url:
          type: string
          description: The URL for the webhook
          example: 'https://webhook-test.com/a0a7aadb8de3e'
        apiKey:
          type: string
          description: API Key para uma requisição autenticada (será enviado como `api-key` em headers)
          example: xxx-xxx-xxx
      required:
        - type
        - url
    WebhookTypeEnum:
      type: string
      description: Type Webhook
      enum:
        - REPORT
        - OPTIN
        - CREDIT_POLICY
        - REPORT_STATUS
        - REPORT_FINISHED
        - REPORT_EXPORTED
        - OPERATION
    CreateReportDto:
      type: object
      properties:
        policyId:
          type: string
        document:
          type: string
        type:
          type: string
      required:
        - policyId
        - document
        - type